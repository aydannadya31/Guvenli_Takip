<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SecurityMonitor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">SecurityMonitor</span>
            </div>
            <nav class="nav-menu">
                <div class="nav-spacer"></div>
                <a href="#" class="nav-item" id="logoutBtn" style="color:var(--accent-red);">
                    <span class="nav-icon">🚪</span>
                    <span>Çıkış</span>
                </a>
            </nav>
            <div class="user-info" id="userInfo">
                <div class="user-avatar" id="userAvatar"></div>
                <div class="user-name" id="userName"></div>
            </div>
        </aside>

        <!-- Ana İçerik -->
        <main class="main-content" id="main-content">
            <div class="page active" id="page-dashboard">
                <div class="page-header">
                    <h1>Hoş Geldiniz</h1>
                </div>
                <div class="dashboard-detail" id="dashboardDetail">
                    <div class="info-panel">
                        <h3>🛡️ SecurityMonitor</h3>
                        <p style="color:var(--text-muted);font-size:14px;line-height:1.6;">
                            Güvenlik takip sistemine hoş geldiniz.<br>
                            Uygulama başarıyla çalışıyor.
                        </p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
