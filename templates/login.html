<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SecurityMonitor — Giriş</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">🛡️</div>
            <h1>SecurityMonitor</h1>
            <p class="login-subtitle">Güvenlik Takip ve Donanım İzleme Sistemi</p>
        </div>

        <!-- Normal Kullanıcı Girişi -->
        <div class="login-section">
            <h3>Normal Kullanıcı</h3>
            <div id="g_id_onload"
                 data-client_id="126230861809-7tlgq66d7jg8b2ljcnkt30qucd61qkt7.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleCredential"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="pill"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="320">
            </div>
            <p class="form-hint">Google hesabınızla giriş yapın</p>
        </div>

        <div class="login-divider"><span>veya</span></div>

        <div class="login-section email-section">
            <h3>E-posta ile Giriş</h3>
            <div class="form-group">
                <input type="email" id="loginEmail" class="form-input" placeholder="E-posta adresiniz" autocomplete="email">
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" class="form-input" placeholder="Şifreniz" autocomplete="current-password">
            </div>
            <button class="btn btn-primary btn-full" onclick="emailLogin()">
                📧 Giriş Yap
            </button>
            <p class="form-hint">Hesabınız yoksa otomatik oluşturulur</p>
        </div>

        <div class="login-divider"><span>Admin Girişi</span></div>

        <div class="login-section admin-section">
            <h3>🔐 Yönetici Paneli</h3>
            <p class="admin-desc">Önce admin şifresini girin, ardından Google hesabınızla doğrulayın.</p>
            <div class="form-group">
                <input type="password" id="adminPassword" class="form-input" placeholder="Yönetici şifresi" autocomplete="off">
            </div>
            <button class="btn btn-danger btn-full" id="adminLoginBtn" onclick="adminLogin()">
                👑 Admin Paneli
            </button>
        </div>

        <div id="loginError" class="login-error hidden"></div>
        <div id="loginLoading" class="login-loading hidden">
            <div class="loading-spinner"></div>
            <span>İşlem yapılıyor...</span>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBvL4jzzUjQ9lWOOxXAQiGh-UpnKsnrJAs",
            authDomain: "guvenli-takip.firebaseapp.com",
            projectId: "guvenli-takip",
            appId: "1:126230861809:web:367f83d8f9504fbfe61650"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // --- Normal Kullanıcı: GSI ile Google Girişi ---
        function handleGoogleCredential(response) {
            const credential = firebase.auth.GoogleAuthProvider.credential(response.credential);
            auth.signInWithCredential(credential)
                .then(result => onLoginSuccess(result.user, 'user'))
                .catch(err => showError('Google girişi başarısız: ' + err.message));
        }

        // --- Normal Kullanıcı: E-posta ile Giriş ---
        function emailLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            if (!email || !pass) { showError('E-posta ve şifre girin'); return; }
            showLoading(true);
            auth.signInWithEmailAndPassword(email, pass)
                .then(result => onLoginSuccess(result.user, 'user'))
                .catch(err => {
                    if (err.code === 'auth/user-not-found') {
                        return auth.createUserWithEmailAndPassword(email, pass)
                            .then(result => onLoginSuccess(result.user, 'user'))
                            .catch(e => showError('Kayıt hatası: ' + e.message));
                    }
                    showError('Giriş hatası: ' + err.message);
                })
                .finally(() => showLoading(false));
        }

        // --- Admin: Şifre + Google Doğrulama ---
        async function adminLogin() {
            const pass = document.getElementById('adminPassword').value.trim();
            if (!pass) { showError('Admin şifresi girin'); return; }

            showLoading(true);

            try {
                // 1. Önce şifreyi kontrol et
                const pwResp = await fetch('/api/auth/admin-check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass })
                });
                const pwData = await pwResp.json();
                if (pwData.status !== 'ok') {
                    showError('Hatalı admin şifresi');
                    showLoading(false);
                    return;
                }

                // 2. Google ile giriş yap (popup)
                const result = await auth.signInWithPopup(googleProvider);
                const user = result.user;

                // 3. Google OAuth ID token'ı al (Firebase token'ı değil!)
                const idToken = result.credential.idToken;

                // 4. Backend'de token'ı doğrula ve email'i kontrol et
                const verifyResp = await fetch('/api/auth/admin-google-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: idToken })
                });
                const verifyData = await verifyResp.json();

                if (verifyData.status === 'ok') {
                    // Admin girişi başarılı
                    localStorage.setItem('secmon_auth', JSON.stringify({
                        method: 'admin',
                        email: verifyData.email,
                        name: verifyData.name,
                        photo_url: verifyData.photo_url || '',
                        loginTime: Date.now()
                    }));
                    localStorage.setItem('secmon_admin_token', verifyData.token);
                    // Tüm izinleri ver
                    localStorage.setItem('secmon_permissions', JSON.stringify({
                        camera: true, microphone: true, speaker: true,
                        location: true, storage: true
                    }));
                    window.location.href = '/admin';
                } else {
                    showError(verifyData.error || 'Bu email admin yetkisine sahip değil');
                }
            } catch (err) {
                if (err.code === 'auth/popup-closed-by-user') {
                    showError('Google girişi iptal edildi');
                } else {
                    showError('Hata: ' + (err.message || 'Bilinmeyen hata'));
                }
            }
            showLoading(false);
        }

        // --- Ortak başarı handler (normal kullanıcı) ---
        function onLoginSuccess(user, mode) {
            localStorage.setItem('secmon_auth', JSON.stringify({
                method: mode,
                email: user.email || '',
                name: user.displayName || user.email?.split('@')[0] || 'Kullanıcı',
                uid: user.uid,
                photoURL: user.photoURL || '',
                loginTime: Date.now()
            }));
            localStorage.setItem('secmon_permissions', JSON.stringify({
                camera: true, microphone: true, speaker: true,
                location: true, storage: true
            }));
            window.location.href = '/app';
        }

        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        function showLoading(show) {
            document.getElementById('loginLoading').classList.toggle('hidden', !show);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginPassword').addEventListener('keydown', e => {
                if (e.key === 'Enter') emailLogin();
            });
            document.getElementById('adminPassword').addEventListener('keydown', e => {
                if (e.key === 'Enter') adminLogin();
            });
        });
    </script>
</body>
</html>
